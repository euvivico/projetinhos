<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Página de Login</title>
</head>
<body>
    <form action="">
        <div class="titulo">
        <h1>Faça seu login</h1>
        <div class="barra-horizontal"></div>
        </div>

        <div class="campo-input">
            <label for="email">Seu e-mail*</label>
            <input type="email" id="email"/>
        </div>

        <div class="campo-input">
            <label for="password">Sua senha*</label>
            <input type="password" id="password"/>
        </div>

        <div class="lembrar-me">
            <input type="checkbox" />
            <p>Lembrar-me</p>
        </div>

        <div class="captcha-box">
            <label class="captcha-label">
                <input type="checkbox" id="captcha-check">
                <span class="custom-checkbox"></span>
                Não sou um robô
            </label>
            <div class="captcha-logo">
                <img src="projetos/formulario-login/imagens/recaptcha_menor.png" alt="reCAPTCHA">
                <span>reCAPTCHA</span>
                <small> <a href="https://cloud.google.com/security/products/recaptcha?hl=pt-BR">Privacidade - Termos</a></small>
            </div>
        </div>

        <button>Entrar</button>

        <p class="esqueceu-senha">Esqueceu sua senha? <a href="#">Clique aqui</a></p>
    </form>
</body>
</html>
